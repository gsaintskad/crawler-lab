apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: crawler
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: frontend
          image: ghcr.io/gsaintskad/crawler-frontend:v1
          ports:
            - containerPort: 3002
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://crawler.local"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: crawler
spec:
  selector:
    app: frontend
  ports:
    - port: 3002
      targetPort: 3002
  type: ClusterIP